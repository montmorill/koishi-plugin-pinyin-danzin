pinyin-danzin:
  messages:
    line: |-
      拼音丁真：注意到
      {#each words as word}
        <i18n path=".quote">
          {word}
        </i18n>
      {/each}
      <i18n path={".tone-" + tone} />
    quote: 「{0}」
    tone-full: 国语四声相等俱全
    tone-1: 皆归一声
    tone-2: 全为阳平
    tone-3: 总属上母
    tone-4: 俱是去调
